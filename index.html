<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday D! 🌸 My girl best friend</title>
<style>
/* ===========================
   D's special birthday vibe
   =========================== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Arial Rounded MT Bold',sans-serif;min-height:100vh;background:linear-gradient(145deg,#fad0c4,#fad4c0,#fec9b0);display:flex;justify-content:center;align-items:center;padding:20px;animation:warmBloom 10s infinite alternate}
@keyframes warmBloom{0%{background:linear-gradient(145deg,#fad0c4,#fad4c0)}100%{background:linear-gradient(145deg,#ffe0cd,#fed7c2)}}
.card{width:100%;max-width:500px;background:rgba(255,248,240,0.98);border-radius:50px 50px 40px 40px;overflow:hidden;box-shadow:0 30px 60px rgba(200,120,80,0.35);position:relative;border:8px solid #fff5ea}
.D-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="20" y="30" font-size="40" fill="%23e3977a" opacity="0.1">D</text><text x="60" y="80" font-size="50" fill="%23d68963" opacity="0.1">🌸</text><circle cx="30" cy="50" r="10" fill="%23edab8b" opacity="0.06"/><circle cx="70" cy="30" r="15" fill="%23e3977a" opacity="0.06"/></svg>');background-size:150px;z-index:0}
.content{position:relative;z-index:1;padding:30px 25px}
.header{text-align:center;margin-bottom:20px;padding-bottom:15px;border-bottom:4px dotted #e3977a}
h1{color:#bb5e3a;font-size:38px;margin-bottom:5px;text-shadow:2px 2px 0 #ffe2d1;letter-spacing:1px}
.D-letter{color:#d2695a;font-size:48px;animation:glowD 2s infinite;display:inline-block}
@keyframes glowD{0%,100%{text-shadow:0 0 5px #ffb59e}50%{text-shadow:0 0 20px #ff8a6c}}
.sub{color:#c46b4b;font-size:18px;font-style:italic}
.photo-section{display:flex;justify-content:center;gap:12px;margin:25px 0;flex-wrap:wrap}
.photo-frame{width:46%;height:180px;border-radius:40px 10px 40px 10px;overflow:hidden;border:5px solid #ffc1a1;box-shadow:0 12px 25px rgba(200,110,70,0.3);background:#ffede1;display:flex;align-items:center;justify-content:center;position:relative}
.photo-frame img{width:100%;height:100%;object-fit:cover}
.photo-frame-full{width:80%;height:200px;border-radius:40px 10px 40px 10px;overflow:hidden;border:5px solid #ffc1a1;box-shadow:0 12px 25px rgba(200,110,70,0.3);background:#ffede1;display:flex;align-items:center;justify-content:center;position:relative;margin:0 auto}
.photo-frame-full img{width:100%;height:100%;object-fit:cover}
.photo-grid-3{display:flex;justify-content:center;gap:10px;margin:20px 0;flex-wrap:wrap}
.photo-grid-3 .photo-frame{width:30%;height:130px}
.message-box{background:#fff6ed;padding:25px;border-radius:40px 10px 40px 10px;margin:20px 0;text-align:center;border:2px solid #fec9b0;box-shadow:0 8px 0 #e0a585}
.message{font-size:22px;color:#b35738;margin-bottom:10px;line-height:1.4}
.highlight{background:#ffe0cf;padding:5px 15px;border-radius:50px;display:inline-block;margin:8px 0}
.quote-bubble{background:#fde4d5;border-radius:30px 30px 30px 5px;padding:15px;margin:15px 0;border-left:8px solid #e3977a;font-size:20px}
.countdown{background:#e3977a;color:#2d1e14;padding:15px;border-radius:60px;text-align:center;font-size:17px;font-weight:bold;margin:25px 0;box-shadow:0 7px 0 #a56544;animation:gentlePulse 2.5s infinite}
@keyframes gentlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}
.buttons{display:flex;justify-content:center;gap:15px;margin-top:25px;position:relative;min-height:120px}
.btn{padding:16px 28px;font-size:20px;border:none;border-radius:50px;cursor:pointer;font-weight:bold;transition:0.25s;min-width:140px;box-shadow:0 8px 0 #a56544;position:relative;border-bottom:3px solid #ffe3d4}
.btn:active{transform:translateY(5px);box-shadow:0 3px 0 #a56544}
.btn-yes{background:#f9ab8e;color:#3e2b1f;z-index:2;font-size:22px}
.btn-yes:hover{background:#ffbba4;transform:translateY(-3px);box-shadow:0 12px 0 #a56544}
.btn-no{background:#c0a28b;color:#fef3e9;position:absolute;border-bottom-color:#8b6f5c;box-shadow:0 8px 0 #6e5543}
.btn-no:hover{background:#d0b29b}
.letter{background:#fffaf5;padding:30px;border-radius:30px 0 30px 0;margin:20px 0;border-left:10px solid #e3977a;box-shadow:0 8px 20px rgba(0,0,0,0.05);text-align:left;line-height:1.9;max-height:380px;overflow-y:auto;font-size:18px;color:#573e2e}
.music-control{position:fixed;bottom:30px;right:30px;width:65px;height:65px;background:#f9ab8e;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 0 #b5623a;z-index:1000;border:4px solid #fff2e6;font-size:30px;color:#412e1f;animation:softBounce 3s infinite}
@keyframes softBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.music-control.muted{background:#baa18d;box-shadow:0 8px 0 #7a614f}
#finalScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#ffd9c5,#fec9b0);display:none;justify-content:center;align-items:center;z-index:10000;padding:20px}
.final-content{background:#fff8f0;padding:50px;border-radius:90px 20px 90px 20px;text-align:center;max-width:90%;animation:bigReveal 1s ease;border:8px solid #ffba9a;box-shadow:0 40px 60px rgba(150,70,30,0.4)}
@keyframes bigReveal{0%{transform:scale(0.2) rotate(-3deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.final-D{font-size:90px;animation:DFloat 1.5s infinite;margin:10px 0;color:#bb5e3a}
@keyframes DFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.final-message{font-size:28px;color:#6b3f2a;margin:20px;background:#ffd9c5;padding:15px 30px;border-radius:60px}
.confetti{position:fixed;width:14px;height:14px;animation:confettiFall 3.8s linear forwards;z-index:9999;border-radius:30%;pointer-events:none}
@keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(800deg);opacity:0}}
.firework{position:fixed;font-size:48px;animation:fireworkPop 1.2s ease-out forwards;z-index:9998;pointer-events:none}
@keyframes fireworkPop{0%{transform:scale(0);opacity:0.9}50%{transform:scale(1.5);opacity:1}100%{transform:scale(2.5);opacity:0}}
.D-tag{background:#e3977a;color:#2f1d12;padding:3px 12px;border-radius:30px;font-weight:bold;font-size:20px;display:inline-block;margin:5px}

/* 30 Before 30 specific styles - matching your theme */
.bucket-container{background:#fff6ed;border-radius:30px;padding:15px;margin:15px 0;border:2px solid #fec9b0;max-height:400px;overflow-y:auto}
.bucket-item{background:#ffe6d9;padding:15px;margin:12px 0;border-radius:20px;border-left:8px solid #e3977a;color:#573e2e;font-size:17px;line-height:1.5;box-shadow:0 4px 8px rgba(0,0,0,0.03)}
.dream-icon{font-size:24px;margin-right:10px}
.thailand-special{background:#ffe0cf;padding:25px;border-radius:30px;margin:20px 0;text-align:center;border:4px dashed #e3977a;animation:gentlePulse 3s infinite}
.thailand-special p{color:#bb5e3a;font-size:24px;margin:12px 0}
.thailand-special .big-icon{font-size:50px;margin:10px}
</style>
</head>
<body>

<div class="card" id="card">
    <div class="D-bg"></div>
</div>

<div id="finalScreen">
    <div class="final-content">
        <div class="final-D">🌸 D 🌸</div>
        <h1 style="color:#b4512e;font-size:48px;margin:5px;">HAPPY BIRTHDAY</h1>
        <div style="font-size:35px;margin:15px;">🎂🎈🎁</div>
        <p class="final-message">Most matured, most beautiful, most D 🤎</p>
        <p style="font-size:24px;background:#f0bc9c;padding:15px 30px;border-radius:60px;color:#3f2b1b;">
            I'm always here — day or night 💫
        </p>
        <p style="font-size:22px;margin-top:25px;">my door (and heart) is always open for you</p>
    </div>
</div>

<div class="music-control" id="musicBtn" onclick="toggleMusic()">
    <span id="musicIcon">🎵</span>
</div>

<script>
// ==============================
// MUSIC - Sapphire by Ed Sheeran
// ==============================
let audio = new Audio('sapphire.mp3');
audio.loop = true;
audio.volume = 0.5;
let isPlaying = false;
function playMusic(){ if(!isPlaying){ audio.play().catch(()=>{}); isPlaying=true; document.getElementById('musicIcon').textContent='🎵'; } }
function toggleMusic(){ const btn=document.getElementById('musicBtn'); const icon=document.getElementById('musicIcon'); if(isPlaying){ audio.pause(); isPlaying=false; icon.textContent='🔇'; btn.classList.add('muted'); } else { playMusic(); btn.classList.remove('muted'); } }

// ==============================
// PHOTOS - 10 images total (using available images with repetition)
// ==============================
const localImages = [
    'a.jpeg', 'b.jpeg', 'c.jpeg', 'd.jpeg', 'e.jpeg', 
    'f.jpeg', '2.jpeg', '3.jpeg', 'Book.png', 'g.jpeg'
];
function getImage(index){return localImages[index % localImages.length];}

// ==============================
// D's 30 BEFORE 30 LIST (from your images)
// ==============================
const bucketList = [
    "💪 Gain at least 5 kgs in a healthy way with nutritionist-guided plan by mid-2026",
    "🏃‍♀️ Run a 5km marathon or complete a 30 day yoga/fitness challenge by my birthday",
    "🧘‍♀️ Take a solid wellness or digital detox retreat for 2+ days and document before 30",
    "😴 Sleep 7+ hours per night consistently for 30 days and document how you feel",
    "✈️ Travel to atleast 5 new Indian states and 1 foreign country before 30",
    "🎒 Go on a backpacking trip with minimal digital use and a journal for 7 days",
    "🌍 Take a completely spontaneous trip without a detailed itinerary",
    "💰 Save a fixed emergency fund (at least 6x monthly expenses) by 2026",
    "📉 Pay off my education loan entirely before age 30",
    "💸 Start a passive income source and earn my first ₹10000",
    "📖 Write and publish my first book, pitch to 5 publishers by age 27",
    "🎙️ Launch a weekly podcast season for at least 3 months by end of 2025",
    "✍️ Submit work to 10 writing contests or literary journals over next 2 years",
    "📝 Complete a 30 day creative writing challenge within a month",
    "📚 Read 100 books across diverse genres by age 29",
    "🎨 Learn a new art form like digital illustration and complete a project by 2026",
    "🖼️ Create a graphic short story combining doodles and storytelling by end of 2026",
    "🎤 Do a spoken word or open mic performance by 2026",
    "💬 Learn a new language to conversational level",
    "🗣️ Get featured or interviewed in a major podcast or media platform before 30",
    "❤️ Volunteer with an NGO supporting education or mental health for at least 2 weeks",
    "💉 Get a meaningful tattoo that symbolises a milestone or journey",
    "🌟 Say 'yes' to something that scares me - solo traveling, initiating a big project",
    "🧠 Establish a daily 20 minute mindfulness meditation habit"
];

// ==============================
// PAGES - 5 pages with exact photo counts
// Page 1: 3 photos
// Page 2: 2 photos
// Page 3: 3 photos (30 before 30)
// Page 4: 1 photo (Thailand)
// Page 5: 1 photo (letter)
// ==============================
let currentPage = 1;

function renderPage() {
    const card = document.getElementById('card');
    
    if (currentPage === 1) {
        card.innerHTML = `
        <div class="content">
            <div class="header">
                <h1>For <span class="D-letter">D</span> 🌸</h1>
                <p class="sub">my one of the fav hooman and my girl best friend</p>
            </div>
            <div class="photo-grid-3">
                <div class="photo-frame"><img src="${getImage(0)}" alt="D 1"></div>
                <div class="photo-frame"><img src="${getImage(1)}" alt="D 2"></div>
                <div class="photo-frame"><img src="${getImage(2)}" alt="D 3"></div>
            </div>
            <div class="message-box">
                <p class="message">Beautiful inside out ✨</p>
                <p class="message">Matured beyond years 🧠</p>
                <p class="message">And somehow still so hilarious 😂</p>
                <div class="quote-bubble">
                    "You're the most real person I know"
                </div>
            </div>
            <div class="countdown" id="countdown"></div>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextPage()">That's my D 💕</button>
                <button class="btn btn-no" onmouseover="moveNo(this)">(you can't escape)</button>
            </div>
        </div>`;
    } 
    else if (currentPage === 2) {
        card.innerHTML = `
        <div class="content">
            <div class="header">
                <h1>D facts <span class="D-letter">📋</span></h1>
                <p class="sub">things you might not admit</p>
            </div>
            <div class="photo-section">
                <div class="photo-frame"><img src="${getImage(3)}" alt="D smile 1"></div>
                <div class="photo-frame"><img src="${getImage(4)}" alt="D smile 2"></div>
            </div>
            <div class="message-box">
                <p class="message">💪 You're so strong (even when you don't feel it)</p>
                <p class="message">📖 You read & write worlds into existence</p>
                <p class="message">😂 Your humor? absolutely UNDERRATED</p>
                <p class="message">🌸 And yes, you're gorgeous - deal with it</p>
            </div>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextPage()">Your 30 before 30 ✨</button>
                <button class="btn btn-no" onmouseover="moveNo(this)">(show me)</button>
            </div>
        </div>`;
    }
    else if (currentPage === 3) {
        // 30 BEFORE 30 LIST PAGE with 3 photos
        let listHtml = '';
        bucketList.forEach(item => {
            listHtml += `<div class="bucket-item">${item}</div>`;
        });
        
        card.innerHTML = `
        <div class="content">
            <div class="header">
                <h1>30 Before 30 <span class="D-letter">📝</span></h1>
                <p class="sub">all your beautiful dreams</p>
            </div>
            <div class="photo-grid-3">
                <div class="photo-frame"><img src="${getImage(5)}" alt="Dream 1"></div>
                <div class="photo-frame"><img src="${getImage(6)}" alt="Dream 2"></div>
                <div class="photo-frame"><img src="${getImage(7)}" alt="Dream 3"></div>
            </div>
            <div class="bucket-container">
                ${listHtml}
            </div>
            <div class="message-box" style="margin-top:10px;">
                <p class="message">That's ${bucketList.length} dreams! 🌟</p>
            </div>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextPage()">Thailand dream ☕📚</button>
                <button class="btn btn-no" onmouseover="moveNo(this)">(so proud)</button>
            </div>
        </div>`;
    }
    else if (currentPage === 4) {
        // THAILAND SPECIAL DREAM PAGE with 1 photo
        card.innerHTML = `
        <div class="content">
            <div class="header">
                <h1>Your Special Dream <span class="D-letter">🌴</span></h1>
                <p class="sub">the one we talk about most</p>
            </div>
            <div class="photo-frame-full">
                <img src="${getImage(8)}" alt="Thailand dream">
            </div>
            
            <div class="thailand-special">
                <div class="big-icon">📚 ☕ 🌴</div>
                <p style="font-size:28px; font-weight:bold;">OPEN A BOOKSTORE + COLD COFFEE SHOP IN THAILAND</p>
                <div class="big-icon">✨ 💫 ✨</div>
                <p style="font-size:20px; margin-top:20px;">I can already picture you there — surrounded by books, making the best cold coffee, writing your own stories.</p>
                <p style="font-size:22px; font-weight:bold; margin-top:20px; background:#f9ab8e; padding:15px; border-radius:60px; color:#3e2b1f;">AND I'LL BE YOUR FIRST CUSTOMER MOHTARMA! 🥤</p>
            </div>
            
            <div class="message-box">
                <p class="message">This dream? It's going to happen.</p>
                <p class="message">I just know it.</p>
            </div>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextPage()">Dear D 💌</button>
                <button class="btn btn-no" onmouseover="moveNo(this)">(can't wait)</button>
            </div>
        </div>`;
    }
    else if (currentPage === 5) {
        card.innerHTML = `
        <div class="content">
            <div class="header">
                <h1>Dear <span class="D-letter">D</span> 💌</h1>
                <p class="sub">from your person</p>
            </div>
            <div class="photo-frame-full">
                <img src="${getImage(9)}" alt="D special">
            </div>
            <div class="letter" id="letter"></div>
            <div class="message-box">
                <p class="message">So... how does it feel to be this amazing? 🤔</p>
                <p class="highlight">I am always here for you, just a text or call away 🤎</p>
            </div>
            <div class="buttons">
                <button class="btn btn-yes" onclick="showFinal()">Open your gift 🎂</button>
                <button class="btn btn-no" onmouseover="moveNo(this)">saving the best</button>
            </div>
        </div>`;
        typeLetter();
    }
    
    updateCountdown();
}

function nextPage() { 
    currentPage++; 
    if (currentPage > 5) currentPage = 1; 
    renderPage(); 
}

// ==============================
// HEARTFELT LETTER (with one special Mohtarma)
// ==============================
function typeLetter(){
    const text=`My dearest D,

You know what I love most about you? It's not just how beautiful you are (though that's obvious). It's that I can talk to you about literally ANYTHING. No filters. No judgment. Just real.

You're the most matured person I know — you carry so much with such grace, even when you don't see your own strength. And yet you never lost your humor, your laughter, your spark.

You read. You write. You create. You dream. And through all of it, you remain so wonderfully, unapologetically YOU.

And those dreams? That 30 before 30 list? I see every single one. The books you'll write, the places you'll travel, the marathon you'll run, the podcast you'll launch, and that beautiful Thailand dream with the bookstore and cold coffee.

I might not always be actively present — life gets messy, we both know that. But I need you to know: my door is always open. Always. I am always here for you, just a text or call away. Late nights, early mornings, good news or bad — I'll be here. To listen. To care. To remind you how incredible you are.

And yes — I still smile thinking about our "backup plan" to live together. That's not just a joke. That's a promise.

Now go crush that 30 before 30 list. The world is waiting for you.

Happy birthday, Mohtarma. You deserve all the happiness this world has to offer.

Always here,
Your person 🤎

P.S. - I'll be your first customer in Thailand. Don't forget. ☕📚`;
    
    const letter = document.getElementById('letter');
    if(!letter)return;
    letter.innerHTML='';
    let i=0;
    function typeNext(){ if(i<text.length){ letter.innerHTML+=text.charAt(i); i++; setTimeout(typeNext,18); } }
    typeNext();
}

// ==============================
// PLAYFUL NO BUTTON
// ==============================
function moveNo(button){
    const container=button.closest('.buttons');
    const maxX=container.offsetWidth-button.offsetWidth-20;
    const maxY=container.offsetHeight-button.offsetHeight-20;
    const x=Math.random()*maxX;
    const y=Math.random()*maxY;
    button.style.left=x+'px';
    button.style.top=y+'px';
}

// ==============================
// CONFETTI & FIREWORKS FUNCTIONS - FIXED
// ==============================
function showFinal(){
    document.getElementById('finalScreen').style.display='flex';
    playMusic();
    
    // Clear any existing confetti/fireworks intervals
    if(window.confettiInterval) clearInterval(window.confettiInterval);
    if(window.fireworksInterval) clearInterval(window.fireworksInterval);
    
    createConfetti();
    createFireworks();
}

function createConfetti(){
    const colors=['#f9ab8e','#e3977a','#ffb59e','#d68963','#fec9b0','#ffc1a1','#e0a585'];
    
    // Create confetti continuously
    window.confettiInterval = setInterval(() => {
        for(let i=0;i<5;i++){ // Create 5 confetti at a time
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 15 + 5) + 'px';
                confetti.style.height = (Math.random() * 15 + 5) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(confetti);
                
                // Remove after animation
                setTimeout(() => {
                    if(confetti.parentNode) confetti.remove();
                }, 3800);
            }, i * 50);
        }
    }, 200); // Create new batch every 200ms
    
    // Stop after 10 seconds
    setTimeout(() => {
        if(window.confettiInterval) clearInterval(window.confettiInterval);
    }, 10000);
}

function createFireworks(){
    const fireworks=['🎆','🎇','✨','🌸','💫','🎉','🎊','💥','❤️','💕','🤎','📖','☕','📚','🌴','🌟'];
    
    window.fireworksInterval = setInterval(() => {
        for(let i=0;i<3;i++){
            setTimeout(() => {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.innerHTML = fireworks[Math.floor(Math.random() * fireworks.length)];
                firework.style.left = (Math.random() * 80 + 10) + 'vw';
                firework.style.top = (Math.random() * 80 + 10) + 'vh';
                firework.style.fontSize = (Math.random() * 30 + 30) + 'px';
                document.body.appendChild(firework);
                
                setTimeout(() => {
                    if(firework.parentNode) firework.remove();
                }, 1200);
            }, i * 150);
        }
    }, 600);
    
    // Stop after 10 seconds
    setTimeout(() => {
        if(window.fireworksInterval) clearInterval(window.fireworksInterval);
    }, 10000);
}

// ==============================
// COUNTDOWN - UPDATED FOR TODAY'S BIRTHDAY
// ==============================
function updateCountdown(){
    const now=new Date();
    const countdownEl=document.getElementById('countdown');
    if(countdownEl) countdownEl.innerHTML=`🌸 IT'S D'S BIRTHDAY TODAY! 🎉🎂 LET'S CELEBRATE! 🌸`;
}

// ==============================
// INIT
// ==============================
renderPage();
setInterval(updateCountdown,1000);
document.addEventListener('click',function startOnClick(){playMusic();document.removeEventListener('click',startOnClick);},{once:true});
</script>
</body>
</html>
